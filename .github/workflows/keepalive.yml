name: Keep Render awake

# Render's free tier spins the service down after ~15 idle minutes, so the
# first visitor eats a 30-60s cold start. A ping every 10 minutes during
# waking hours (11:00-06:59 UTC = 06:00-01:59 Lima) keeps it warm for free.
on:
  schedule:
    - cron: "*/10 11-23 * * *"
    - cron: "*/10 0-6 * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping health endpoint
        run: |
          code=$(curl -s -o /dev/null -w "%{http_code}" -m 60 https://peruobservatorio.onrender.com/api/health || true)
          echo "health -> $code"
          test "$code" = "200"
